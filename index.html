// ── HOOKS ────────────────────────────────────────────────────────────────────

function useReveal(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('visible'), delay); obs.unobserve(el); }
    }, {threshold:0.08, rootMargin:'0px 0px -50px 0px'});
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return ref;
}

// ── CURSOR ───────────────────────────────────────────────────────────────────

function Cursor() {
  const dot  = useRef(null);
  const ring = useRef(null);
  const pos  = useRef({x:0,y:0});
  const rPos = useRef({x:0,y:0});

  useEffect(() => {
    const move = e => { pos.current = {x:e.clientX,y:e.clientY}; };
    window.addEventListener('mousemove', move);
    let raf;
    const tick = () => {
      rPos.current.x += (pos.current.x - rPos.current.x) * 0.13;
      rPos.current.y += (pos.current.y - rPos.current.y) * 0.13;
      if(dot.current)  { dot.current.style.left  = pos.current.x+'px'; dot.current.style.top  = pos.current.y+'px'; }
      if(ring.current) { ring.current.style.left = rPos.current.x+'px'; ring.current.style.top = rPos.current.y+'px'; }
      raf = requestAnimationFrame(tick);
    };
    tick();
    const big   = () => { if(ring.current){ring.current.style.width='46px';ring.current.style.height='46px';} };
    const small = () => { if(ring.current){ring.current.style.width='32px';ring.current.style.height='32px';} };
    document.addEventListener('mouseover', e => { if(e.target.closest('a,button,[data-hover]')) big(); else small(); });
    return () => { window.removeEventListener('mousemove',move); cancelAnimationFrame(raf); };
  }, []);

  return (
    <>
      <div ref={dot}  id="cursor-dot" />
      <div ref={ring} id="cursor-ring" />
    </>
  );
}

// ── PARTICLES ────────────────────────────────────────────────────────────────

function Particles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const c = canvasRef.current;
    const ctx = c.getContext('2d');
    let pts = [], raf;
    const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    class P {
      constructor(){ this.reset(); }
      reset(){
        this.x = Math.random()*c.width; this.y = Math.random()*c.height;
        this.s = Math.random()*1.6+0.3; this.vx=(Math.random()-.5)*.22; this.vy=(Math.random()-.5)*.22;
        this.op=Math.random()*.3+.05; this.col=Math.random()>.6?'#F59E0B':Math.random()>.5?'#50B4FC':'#00D4FF';
      }
      update(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>c.width||this.y<0||this.y>c.height)this.reset(); }
      draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle=this.col; ctx.globalAlpha=this.op; ctx.fill(); }
    }
    for(let i=0;i<85;i++) pts.push(new P());
    const loop=()=>{
      ctx.clearRect(0,0,c.width,c.height); ctx.globalAlpha=1;
      pts.forEach(p=>{ p.update(); p.draw(); });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='#0078D4'; ctx.globalAlpha=(1-d/100)*.07; ctx.lineWidth=0.5; ctx.stroke(); }
      }
      ctx.globalAlpha=1; raf=requestAnimationFrame(loop);
    };
    loop();
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
  },[]);
  return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none"/>;
}
