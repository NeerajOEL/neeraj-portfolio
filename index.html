*{margin:0;padding:0;box-sizing:border-box;cursor:none!important;}
html{scroll-behavior:smooth;}
body{background:#060912;color:#E2E8F0;font-family:'DM Sans',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#060912;}
::-webkit-scrollbar-thumb{background:#0078D4;border-radius:2px;}

/* Cursor */
#cursor-dot{position:fixed;width:8px;height:8px;background:#00D4FF;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(0,212,255,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s;}

/* Scrollbar */
.flow-line{stroke-dasharray:8 5;animation:flow 3s linear infinite;}
.flow-slow{stroke-dasharray:8 5;animation:flow 5s linear infinite;}
.flow-amber{stroke-dasharray:8 5;animation:flow 4s linear infinite;}

/* Glass */
.glass{background:rgba(12,17,32,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}

/* Gradients */
.text-grad-azure{background:linear-gradient(135deg,#50B4FC,#0078D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.text-grad-neon{background:linear-gradient(135deg,#00D4FF,#0078D4,#50B4FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.text-grad-amber{background:linear-gradient(135deg,#FCD34D,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Grid bg */
.bg-grid{background-image:linear-gradient(rgba(0,120,212,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,120,212,0.04) 1px,transparent 1px);background-size:40px 40px;}

/* Reveal */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* Tool badge */
.tool-badge:hover{transform:translateY(-2px) scale(1.04);transition:all .18s ease;}

/* Animations */
@keyframes flow{to{stroke-dashoffset:-200;}}
@keyframes pulseGlow{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes nodePulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes scanLine{0%{top:-5%;}100%{top:105%;}}
@keyframes dataFlow{0%{transform:translateX(-8px);opacity:0;}50%{opacity:1;}100%{transform:translateX(8px);opacity:0;}}
@keyframes borderPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,120,212,0);} 50%{box-shadow:0 0 0 4px rgba(0,120,212,0.15);}}

.anim-slide-1{animation:slideUp .7s .05s ease both;}
.anim-slide-2{animation:slideUp .7s .15s ease both;}
.anim-slide-3{animation:slideUp .7s .25s ease both;}
.anim-slide-4{animation:slideUp .7s .35s ease both;}
.anim-slide-5{animation:slideUp .7s .45s ease both;}
.anim-fade{animation:fadeIn .8s .1s ease both;}
.anim-ticker{animation:ticker 26s linear infinite;}
.anim-float{animation:float 6s ease-in-out infinite;}
.anim-float2{animation:float 7s 1.5s ease-in-out infinite;}
.anim-pulse{animation:pulseGlow 2s ease-in-out infinite;}

/* Nav link underline */
.nav-link::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#0078D4;transition:width .3s;}
.nav-link:hover::after,.nav-link.active::after{width:100%;}

/* Timeline */
.timeline-line{position:absolute;left:6px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,#0078D4,rgba(0,120,212,0.15),transparent);}

/* Card hover */
.proj-card{transition:transform .3s,box-shadow .3s,border-color .3s;}
.proj-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(0,120,212,0.18);}

/* Skill pill hover */
.skill-pill{transition:all .2s;}
.skill-pill:hover{transform:translateY(-2px);}

/* ── THEME TRANSITION ── */
*, *::before, *::after {
  transition-property: background-color, border-color, color, fill, stroke, box-shadow;
  transition-duration: 0.25s;
  transition-timing-function: ease;

.flow-line, .flow-slow, .flow-amber, .reveal, .proj-card,
.tool-badge, .skill-pill, #cursor-dot, #cursor-ring {
  transition-property: opacity, transform, border-color, box-shadow !important;

/* Theme toggle button */
.theme-toggle {

  width: 48px;
  height: 26px;
  border-radius: 13px;
  cursor: none;
  border: 1px solid rgba(0,120,212,0.35);

// ── HOOKS ────────────────────────────────────────────────────────────────────

function useReveal(delay = 0) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => el.classList.add('visible'), delay); obs.unobserve(el); }
    }, {threshold:0.08, rootMargin:'0px 0px -50px 0px'});
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  return ref;
}

// ── CURSOR ───────────────────────────────────────────────────────────────────

function Cursor() {
  const dot  = useRef(null);
  const ring = useRef(null);
  const pos  = useRef({x:0,y:0});
  const rPos = useRef({x:0,y:0});

  useEffect(() => {
    const move = e => { pos.current = {x:e.clientX,y:e.clientY}; };
    window.addEventListener('mousemove', move);
    let raf;
    const tick = () => {
      rPos.current.x += (pos.current.x - rPos.current.x) * 0.13;
      rPos.current.y += (pos.current.y - rPos.current.y) * 0.13;
      if(dot.current)  { dot.current.style.left  = pos.current.x+'px'; dot.current.style.top  = pos.current.y+'px'; }
      if(ring.current) { ring.current.style.left = rPos.current.x+'px'; ring.current.style.top = rPos.current.y+'px'; }
      raf = requestAnimationFrame(tick);
    };
    tick();
    const big   = () => { if(ring.current){ring.current.style.width='46px';ring.current.style.height='46px';} };
    const small = () => { if(ring.current){ring.current.style.width='32px';ring.current.style.height='32px';} };
    document.addEventListener('mouseover', e => { if(e.target.closest('a,button,[data-hover]')) big(); else small(); });
    return () => { window.removeEventListener('mousemove',move); cancelAnimationFrame(raf); };
  }, []);

  return (
    <>
      <div ref={dot}  id="cursor-dot" />
      <div ref={ring} id="cursor-ring" />
    </>
  );
}

// ── PARTICLES ────────────────────────────────────────────────────────────────

function Particles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const c = canvasRef.current;
    const ctx = c.getContext('2d');
    let pts = [], raf;
    const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    class P {
      constructor(){ this.reset(); }
      reset(){
        this.x = Math.random()*c.width; this.y = Math.random()*c.height;
        this.s = Math.random()*1.6+0.3; this.vx=(Math.random()-.5)*.22; this.vy=(Math.random()-.5)*.22;
        this.op=Math.random()*.3+.05; this.col=Math.random()>.6?'#F59E0B':Math.random()>.5?'#50B4FC':'#00D4FF';
      }
      update(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>c.width||this.y<0||this.y>c.height)this.reset(); }
      draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fillStyle=this.col; ctx.globalAlpha=this.op; ctx.fill(); }
    }
    for(let i=0;i<85;i++) pts.push(new P());
    const loop=()=>{
      ctx.clearRect(0,0,c.width,c.height); ctx.globalAlpha=1;
      pts.forEach(p=>{ p.update(); p.draw(); });
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='#0078D4'; ctx.globalAlpha=(1-d/100)*.07; ctx.lineWidth=0.5; ctx.stroke(); }
      }
      ctx.globalAlpha=1; raf=requestAnimationFrame(loop);
    };
    loop();
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
  },[]);
  return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none"/>;
}

                    style={{background:item.color,boxShadow:`0 0 12px ${item.color}90`}}/>
                  {/* Card */}
                  <div className="proj-card p-5 rounded-2xl backdrop-blur"

                    onMouseEnter={e=>{e.currentTarget.style.borderColor=`${item.color}45`;}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=`${item.color}22`;}}>
                    <div className="flex flex-wrap items-start justify-between gap-2 mb-4">
                      <div>
                        <h3 className="font-display text-xl font-semibold text-white mb-1">{item.role}</h3>
                        <div className="flex items-center gap-2 text-sm">
                          <span className="font-medium" style={{color:item.color}}>{item.company}</span>
                          <span className="text-slate-600">·</span>
                          <span className="text-slate-500">{item.location}</span>
                        </div>
                      </div>
                      <span className="font-mono text-xs tracking-wider px-3 py-1 rounded-full" style={{color:item.color,border:`1px solid ${item.color}40`,background:`${item.color}0a`}}>{item.period}</span>
                    </div>
                    <ul className="space-y-2">
                      {item.points.map((pt,j) => (
                        <li key={j} className="flex gap-2 text-sm text-slate-400 leading-relaxed">
                          <span className="mt-1.5 text-[0.6rem] flex-shrink-0" style={{color:item.color}}>▸</span>
                          <span dangerouslySetInnerHTML={{__html:pt.replace(/<b>/g,'<strong class="text-slate-200">').replace(/<\/b>/g,'</strong>')}}/>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

const PIPELINE_EXTRA = {
  SOURCE:    { icon:'🗄️', record:'Raw source systems', badge:'INPUT',   metrics:[{k:'Systems',v:'MES, ERP, Oracle'},{k:'Format',v:'Structured + Semi-structured'},{k:'Frequency',v:'Hourly trigger'}] },
  INGEST:    { icon:'🔷', record:'Azure Data Factory', badge:'INGEST',  metrics:[{k:'Pipelines',v:'20+ ADF pipelines'},{k:'Pattern',v:'Watermark + Tumbling Window'},{k:'Retry',v:'3× with backoff'}] },
  BRONZE:    { icon:'📦', record:'Raw landing zone',   badge:'RAW',     metrics:[{k:'Storage',v:'ADLS Gen2'},{k:'Format',v:'Parquet / Delta'},{k:'Retention',v:'Full audit trail'}] },
  TRANSFORM: { icon:'⚡', record:'Databricks cluster', badge:'COMPUTE', metrics:[{k:'Engine',v:'PySpark distributed'},{k:'Quality',v:'Great Expectations gates'},{k:'Scale',v:'1M+ records/month'}] },
  SILVER:    { icon:'🔄', record:'dbt models',         badge:'CLEAN',   metrics:[{k:'Models',v:'Staging → Intermediate'},{k:'Tests',v:'Schema + freshness checks'},{k:'Lineage',v:'Full column lineage'}] },
  GOLD:      { icon:'⭐', record:'Aggregated metrics',  badge:'SERVE',   metrics:[{k:'Tables',v:'5 fact + 12 dim'},{k:'Schema',v:'Star schema / SCD Type 2'},{k:'Optimised',v:'Z-ordering + compaction'}] },
  SERVE:     { icon:'📊', record:'End consumers',      badge:'OUTPUT',  metrics:[{k:'Dashboards',v:'4 live Power BI'},{k:'Users',v:'Production heads + mgmt'},{k:'Refresh',v:'Daily by 6am SLA'}] },
};

function PipelineViz() {
  const [active,  setActive]  = useState('SOURCE');
  const [locked,  setLocked]  = useState(false);
  const [hovered, setHovered] = useState(null);
  const timerRef   = useRef(null);
  const unlockRef  = useRef(null);
  const lockedRef  = useRef(false);
  const ref = useReveal();
  const { dark } = useTheme();

  const textPrimary   = dark ? '#E2E8F0' : '#1A2540';
  const textSecondary = dark ? '#64748B' : '#5A6E94';
  const cardBg        = dark ? 'rgba(12,17,32,0.9)' : 'rgba(255,255,255,0.95)';
  const stageBg       = dark ? 'rgba(12,17,32,0.7)' : 'rgba(255,255,255,0.8)';

  lockedRef.current = locked;

  // Auto-advance every 15s — skips when locked
  useEffect(() => {
    timerRef.current = setInterval(() => {
      if (!lockedRef.current) {
        setActive(prev => {
          const idx = PIPELINE_STAGES.findIndex(s => s.label === prev);
          return PIPELINE_STAGES[(idx + 1) % PIPELINE_STAGES.length].label;
        });
      }
    }, 15000);
    return () => { clearInterval(timerRef.current); clearTimeout(unlockRef.current); };
  }, []);

  const handleClick = (label) => {
    clearTimeout(unlockRef.current);
    if (locked && active === label) {
      setLocked(false); // click locked stage again → unlock
    } else {
      setActive(label);
      setLocked(true);
      // auto-unlock after 45s idle
      unlockRef.current = setTimeout(() => setLocked(false), 45000);
    }
  };

  // hover previews without locking; falling back to active when not hovering
  const displayLabel = hovered || active;
  const activeStage  = PIPELINE_STAGES.find(s => s.label === displayLabel);
  const activeDetail = PIPELINE_DETAILS[displayLabel];
  const activeExtra  = PIPELINE_EXTRA[displayLabel];

  return (
    <section id="pipeline" className="py-24">
      <div className="max-w-7xl mx-auto px-6">
        <div ref={ref} className="reveal">

          {/* Header */}
          <p className="font-mono text-xs tracking-[0.2em] uppercase mb-3 flex items-center gap-3" style={{color:'#0078D4'}}>
            <span className="w-8 h-px bg-[#0078D4]"/>Architecture
          </p>
          <h2 className="font-display text-4xl md:text-5xl font-bold mb-2" style={{color:textPrimary}}>
            My data pipeline.
          </h2>

          {/* Subtitle + status pill */}
          <div className="flex items-center gap-3 mb-10 flex-wrap">
            <p className="font-body text-sm" style={{color:textSecondary}}>
              Hover to preview · Click to lock 
            </p>
            {locked ? (
              <span className="font-mono text-[0.58rem] tracking-widest px-2.5 py-1 rounded-full"
                style={{background:'rgba(245,158,11,0.12)', border:'1px solid rgba(245,158,11,0.35)', color:'#F59E0B'}}>
                🔒 LOCKED — click again to resume
              </span>
            ) : (
              <span className="font-mono text-[0.58rem] tracking-widest px-2.5 py-1 rounded-full flex items-center gap-1.5"
                style={{background:'rgba(16,185,129,0.1)', border:'1px solid rgba(16,185,129,0.3)', color:'#10B981'}}>
                <span className="w-1.5 h-1.5 rounded-full bg-[#10B981]" style={{animation:'pulseGlow 1.5s ease-in-out infinite'}}/>
                AUTO-CYCLING
              </span>
            )}
          </div>

          {/* Two-column layout */}
          <div className="grid lg:grid-cols-[320px_1fr] gap-6 items-start">

            {/* LEFT — vertical stage list */}
            <div className="flex flex-col gap-0">
              {PIPELINE_STAGES.map((s, i) => {
                const isDisplay = displayLabel === s.label;
                const isLocked  = locked && active === s.label;
                const extra = PIPELINE_EXTRA[s.label];
                return (
                  <div key={s.label} className="flex flex-col items-stretch">
                    {/* Stage row */}
                    <button
                      onMouseEnter={() => setHovered(s.label)}
                      onMouseLeave={() => setHovered(null)}
                      onClick={() => handleClick(s.label)}
                      className="flex items-center gap-3 px-4 py-3 rounded-xl text-left w-full transition-all duration-200"
                      style={{
                        background: isDisplay ? s.bg.replace('0.13','0.22') : 'transparent',
                        border: `1px solid ${isDisplay ? s.border : 'transparent'}`,
                        boxShadow: isDisplay ? `0 4px 20px ${s.color}22` : 'none',
                        cursor: 'none',
                      }}
                    >
                      {/* Icon box */}
                      <div className="relative flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200"
                        style={{
                          background: isDisplay ? `${s.color}20` : 'rgba(255,255,255,0.04)',
                          border: `1px solid ${isDisplay ? s.border : 'rgba(255,255,255,0.06)'}`,
                        }}>
                        <span style={{fontSize:'1.1rem'}}>{extra.icon}</span>
                        {isLocked && (
                          <span className="absolute -top-1 -right-1 font-mono text-[0.5rem] w-4 h-4 rounded-full flex items-center justify-center"
                            style={{background:s.color, color:'#000', fontWeight:700, fontSize:'9px'}}>
                            🔒
                          </span>
                        )}
                        {isDisplay && !locked && (
                          <span className="absolute -top-1 -right-1 w-2.5 h-2.5 rounded-full"
                            style={{background:s.color, boxShadow:`0 0 6px ${s.color}`, animation:`nodePulse ${1.4+i*.2}s ease-in-out infinite`}}/>
                        )}
                      </div>

                      {/* Labels */}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="font-mono text-[0.6rem] tracking-widest font-medium transition-colors duration-200"
                            style={{color: isDisplay ? s.color : textSecondary}}>
                            {String(i+1).padStart(2,'0')} {s.label}
                          </span>
                          {isDisplay && (
                            <span className="font-mono text-[0.5rem] tracking-widest px-1.5 py-0.5 rounded"
                              style={{background:`${s.color}18`, color:s.color, border:`1px solid ${s.color}35`}}>
                              {isLocked ? 'LOCKED' : extra.badge}
                            </span>
                          )}
                        </div>
                        <div className="font-body text-xs truncate mt-0.5 transition-colors duration-200"
                          style={{color: isDisplay ? textPrimary : textSecondary}}>
                          {s.sub}
                        </div>
                      </div>

                      {/* Arrow */}
                      <span className="font-mono text-xs transition-all duration-200 flex-shrink-0"
                        style={{
                          color: isDisplay ? s.color : 'transparent',
                          transform: isDisplay ? 'translateX(0)' : 'translateX(-6px)',
                        }}>
                        →
                      </span>
                    </button>

                    {/* Animated connector */}
                    {i < PIPELINE_STAGES.length - 1 && (
                      <div className="flex items-center pl-[28px] py-0.5" style={{height:'28px'}}>
                        <svg width="12" height="28" className="overflow-visible flex-shrink-0">
                          <line x1="6" y1="0" x2="6" y2="28"
                            stroke={s.color} strokeWidth="1.5" strokeDasharray="4 3"
                            className="flow-line" opacity="0.55"/>
                          <circle cx="6" cy="14" r="2.5"
                            fill={s.color} opacity="0.85"
                            style={{animation:`nodePulse ${1.5+i*.25}s ease-in-out ${i*.15}s infinite`}}/>
                        </svg>
                        {displayLabel === s.label && (
                          <span className="font-mono text-[0.52rem] ml-2 tracking-wider" style={{color:`${s.color}75`}}>
                            → {PIPELINE_STAGES[i+1].sub}
                          </span>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* RIGHT — detail panel */}
            {activeStage && (
              <div className="rounded-2xl overflow-hidden" style={{border:`1px solid ${activeStage.border}`, background: cardBg, boxShadow:`0 8px 40px ${activeStage.color}18`}}>

                {/* Panel header with gradient banner */}
                <div className="px-6 py-5 relative overflow-hidden"
                  style={{background:`linear-gradient(135deg, ${activeStage.color}18, ${activeStage.color}06)`}}>
                  {/* Background pattern */}
                  <div className="absolute inset-0 opacity-10"
                    style={{backgroundImage:'radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px)', backgroundSize:'20px 20px'}}/>
                  <div className="relative flex items-start justify-between gap-4">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="font-mono text-[0.6rem] tracking-widest" style={{color:activeStage.color}}>
                          STAGE {PIPELINE_STAGES.findIndex(s=>s.label===displayLabel)+1} OF {PIPELINE_STAGES.length}
                        </span>
                        <span className="font-mono text-[0.52rem] px-2 py-0.5 rounded-full"
                          style={{background:`${activeStage.color}22`, border:`1px solid ${activeStage.color}45`, color:activeStage.color}}>
                          {activeExtra.badge}
                        </span>
                      </div>
                      <h3 className="font-display text-2xl font-bold mb-0.5" style={{color: activeStage.color}}>
                        {activeStage.label}
                      </h3>
                      <p className="font-body text-sm" style={{color:textSecondary}}>{activeStage.sub}</p>
                    </div>
                    {/* Big icon */}
                    <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0"
                      style={{background:`${activeStage.color}15`, border:`1px solid ${activeStage.color}35`}}>
                      {activeExtra.icon}
                    </div>
                  </div>
                </div>

                <div className="p-6 space-y-5">

                  {/* Description */}
                  <p className="font-body text-sm leading-relaxed" style={{color:textSecondary}}>
                    {activeDetail.desc}
                  </p>

                  {/* Tools — 2-col card grid with brand colors */}
                  <div>
                    <div className="font-mono text-[0.62rem] tracking-widest uppercase mb-3 flex items-center gap-2" style={{color:activeStage.color}}>
                      <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="currentColor" strokeWidth="1.2"/><circle cx="5" cy="5" r="1.5" fill="currentColor"/></svg>
                      Tools & Technologies
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      {activeDetail.tools.map((t, ti) => {
                        const tool = TOOLS[t] || {bg:'rgba(100,116,139,0.1)',border:'rgba(100,116,139,0.25)',text:'#94A3B8',icon:'○'};
                        return (
                          <div key={t}
                            className="flex items-center gap-2.5 px-3 py-2.5 rounded-xl"
                            style={{
                              background: tool.bg,
                              border: `1px solid ${tool.border}`,
                            }}>
                            <span className="text-base flex-shrink-0 w-6 text-center leading-none">{tool.icon}</span>
                            <span className="font-mono text-[0.68rem] font-medium leading-tight" style={{color: tool.text}}>{t}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Metrics grid */}
                  <div>
                    <div className="font-mono text-[0.62rem] tracking-widest uppercase mb-2.5" style={{color:activeStage.color}}>
                      Stage Metrics
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      {activeExtra.metrics.map(m => (
                        <div key={m.k} className="p-3 rounded-xl"
                          style={{background:`${activeStage.color}08`, border:`1px solid ${activeStage.color}20`}}>
                          <div className="font-mono text-[0.55rem] tracking-wider uppercase mb-1" style={{color:`${activeStage.color}90`}}>{m.k}</div>
                          <div className="font-body text-xs font-medium leading-snug" style={{color:textPrimary}}>{m.v}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Navigate prev / next */}
                  <div className="flex items-center justify-between pt-2 border-t" style={{borderColor:`${activeStage.color}18`}}>
                    <button
                      onClick={() => {
                        const idx = PIPELINE_STAGES.findIndex(s=>s.label===displayLabel);
                        if(idx > 0) { setActive(PIPELINE_STAGES[idx-1].label); setLocked(true); }
                      }}
                      disabled={PIPELINE_STAGES.findIndex(s=>s.label===displayLabel) === 0}
                      className="flex items-center gap-1.5 font-mono text-[0.65rem] tracking-wider transition-all duration-200 px-3 py-1.5 rounded-lg"
                      style={{
                        color: PIPELINE_STAGES.findIndex(s=>s.label===displayLabel)===0 ? 'rgba(100,116,139,0.3)' : textSecondary,
                        cursor:'none',
                        border:`1px solid ${PIPELINE_STAGES.findIndex(s=>s.label===displayLabel)===0 ? 'transparent' : 'rgba(255,255,255,0.08)'}`,
                      }}
                    >
                      ← Prev stage
                    </button>

                    {/* Stage dots */}
                    <div className="flex gap-1.5">
                      {PIPELINE_STAGES.map((s,i) => (
                        <button key={i} onClick={()=>{ setActive(s.label); setLocked(true); }}
                          className="rounded-full transition-all duration-200"
                          style={{
                            width: displayLabel===s.label ? '20px' : '6px',
                            height:'6px',
                            background: displayLabel===s.label ? s.color : 'rgba(255,255,255,0.15)',
                            cursor:'none',
                          }}/>
                      ))}
                    </div>

                    <button
                      onClick={() => {
                        const idx = PIPELINE_STAGES.findIndex(s=>s.label===displayLabel);
                        if(idx < PIPELINE_STAGES.length-1) { setActive(PIPELINE_STAGES[idx+1].label); setLocked(true); }
                      }}
                      disabled={PIPELINE_STAGES.findIndex(s=>s.label===displayLabel) === PIPELINE_STAGES.length-1}
                      className="flex items-center gap-1.5 font-mono text-[0.65rem] tracking-wider transition-all duration-200 px-3 py-1.5 rounded-lg"
                      style={{
                        color: PIPELINE_STAGES.findIndex(s=>s.label===displayLabel)===PIPELINE_STAGES.length-1 ? 'rgba(100,116,139,0.3)' : textSecondary,
                        cursor:'none',
                        border:`1px solid ${PIPELINE_STAGES.findIndex(s=>s.label===displayLabel)===PIPELINE_STAGES.length-1 ? 'transparent' : 'rgba(255,255,255,0.08)'}`,
                      }}
                    >
                      Next stage →
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Bottom metrics bar */}
          <div className="mt-8 grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              {label:'Pipeline Type', value:'Batch + Near Real-Time',  color:'#0078D4'},
              {label:'Records/Month', value:'1,000,000+',               color:'#FF3621'},
              {label:'SLA',           value:'Daily refresh by 6am',    color:'#F59E0B'},
              {label:'Quality Gate',  value:'Great Expectations + dbt', color:'#10B981'},
            ].map(m=>(
              <div key={m.label} className="p-4 rounded-xl transition-all duration-200"
                style={{border:'1px solid rgba(0,120,212,0.12)',background:'rgba(0,120,212,0.03)'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,120,212,0.28)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(0,120,212,0.12)';}}>
                <div className="font-mono text-[0.58rem] tracking-widest uppercase mb-1" style={{color:textSecondary}}>{m.label}</div>
                <div className="font-display font-semibold text-sm" style={{color:m.color}}>{m.value}</div>
              </div>
            ))}
          </div>

        </div>
      </div>
    </section>
  );
}

// ── FLOATING DOWNLOAD FAB ────────────────────────────────────────────────────

function FloatingDownload() {
  const { dark } = useTheme();
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const fn = () => setVisible(window.scrollY > 400);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <a
      href="Neeraj_Singh_Guleria.pdf"
      download="Neeraj_Singh_Guleria_Resume.pdf"
      title="Download Resume PDF"
      className="dl-btn"
      style={{
        position: 'fixed',
        bottom: '2rem',
        right: '2rem',
        zIndex: 60,
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0) scale(1)' : 'translateY(12px) scale(0.92)',
        transition: 'opacity 0.3s, transform 0.3s',
        pointerEvents: visible ? 'auto' : 'none',
        padding: '10px 18px',
        fontSize: '0.75rem',
        borderRadius: '8px',
        boxShadow: '0 4px 20px rgba(16,185,129,0.25)',
      }}
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download CV
    </a>
  );
}

function App() {
  const [dark, setDark] = useState(true);

  const toggle = () => {
    setDark(prev => {
      const next = !prev;
      document.body.classList.toggle('light', !next);
      return next;
    });
  };

  // Apply class on mount
  useEffect(() => {
    document.body.classList.toggle('light', !dark);
  }, []);

  return (
    <ThemeCtx.Provider value={{ dark, toggle }}>
      <Cursor/>
      <Navbar/>
      <FloatingDownload/>
      <main>
        <Hero/>
        <About/>
        <Experience/>
        <PipelineViz/>
        <DEProjects/>
        <DAProjects/>
        <Skills/>
        <Certifications/>
        <Contact/>
      </main>
      <Footer/>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
